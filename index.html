<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover"/>
<meta name="theme-color" content="#0a0a0f"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>SPOLADOR · Raciocínio Lógico</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>"/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>

<style>
/* ─── RESET ─────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{height:100%;overscroll-behavior:none}
body{min-height:100%;font-family:'DM Sans',sans-serif;-webkit-font-smoothing:antialiased;transition:background .3s,color .3s;overscroll-behavior:none}
button{font-family:'DM Sans',sans-serif;cursor:pointer;border:none;outline:none;-webkit-tap-highlight-color:transparent}
input,textarea{font-family:'DM Sans',sans-serif;outline:none}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px}

/* ─── TOKENS: DARK (padrão) ─────────────────────── */
:root{
  --bg:#0a0a0f;
  --bg2:#12121a;
  --bg3:#1a1a26;
  --bg4:#21212f;
  --border:rgba(255,255,255,.06);
  --border2:rgba(255,255,255,.12);
  --border3:rgba(255,255,255,.2);
  --text:#f0f0ff;
  --text2:rgba(240,240,255,.6);
  --text3:rgba(240,240,255,.3);
  --text4:rgba(240,240,255,.14);
  --green:#00e676;
  --green2:#00c853;
  --green-bg:rgba(0,230,118,.1);
  --green-border:rgba(0,230,118,.25);
  --red:#ff5252;
  --red-bg:rgba(255,82,82,.1);
  --red-border:rgba(255,82,82,.25);
  --yellow:#ffd740;
  --blue:#448aff;
  --purple:#e040fb;
  --orange:#ff6d00;
  --mono:'JetBrains Mono',monospace;
  --display:'Syne',sans-serif;
  --sans:'DM Sans',sans-serif;
  --r:20px;--r-sm:12px;--r-xs:8px;
  --nav-h:72px;
  --safe-b:env(safe-area-inset-bottom,0px);
}

/* ─── TOKENS: LIGHT ──────────────────────────────── */
body.light{
  --bg:#f5f5f7;
  --bg2:#ffffff;
  --bg3:#ebebf0;
  --bg4:#e0e0e8;
  --border:rgba(0,0,0,.07);
  --border2:rgba(0,0,0,.13);
  --border3:rgba(0,0,0,.22);
  --text:#0a0a14;
  --text2:rgba(10,10,20,.6);
  --text3:rgba(10,10,20,.35);
  --text4:rgba(10,10,20,.12);
  --green:#00a844;
  --green2:#007d32;
  --green-bg:rgba(0,168,68,.09);
  --green-border:rgba(0,168,68,.22);
  --red:#d32f2f;
  --red-bg:rgba(211,47,47,.08);
  --red-border:rgba(211,47,47,.2);
  --yellow:#f57f17;
  --blue:#1565c0;
  --purple:#7b1fa2;
  --orange:#e65100;
}
body.light #loader{background:var(--bg)}

/* ─── LAYOUT GLOBAL ─────────────────────────────── */
#loader{
  position:fixed;inset:0;background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:20px;z-index:9999;transition:opacity .4s;
}
#app{
  display:none;
  min-height:100vh;
  background:var(--bg);
  color:var(--text);
  /* espaço para nav bar inferior */
  padding-bottom:calc(var(--nav-h) + var(--safe-b));
}
/* Telas sem nav bar (login, quiz) */
#app.no-nav{padding-bottom:0}

/* ─── BARRA DE NAV INFERIOR ──────────────────────── */
#nav-bar{
  position:fixed;bottom:0;left:0;right:0;
  height:calc(var(--nav-h) + var(--safe-b));
  padding-bottom:var(--safe-b);
  background:var(--bg2);
  border-top:1px solid var(--border);
  display:flex;align-items:flex-start;justify-content:space-around;
  padding-top:8px;
  z-index:100;
  display:none; /* controlado por JS */
}
.nav-item{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  min-width:60px;padding:6px 8px;border-radius:var(--r-sm);
  background:none;color:var(--text3);transition:all .2s;
  font-size:10px;font-weight:600;letter-spacing:.04em;text-transform:uppercase;
}
.nav-item.active{color:var(--green)}
.nav-item .nav-icon{font-size:22px;line-height:1;position:relative}
.nav-badge{
  position:absolute;top:-4px;right:-8px;
  background:var(--red);color:#fff;
  font-size:9px;font-weight:800;font-family:var(--mono);
  padding:1px 5px;border-radius:10px;min-width:16px;text-align:center;
}

/* ─── COMPONENTES BASE ───────────────────────────── */
.card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r)}
.card2{background:var(--bg3);border:1px solid var(--border);border-radius:var(--r-sm)}
.glass{background:rgba(10,10,15,.85);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border)}
body.light .glass{background:rgba(245,245,247,.9)}

/* BOTÕES */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;border-radius:var(--r-sm);font-weight:700;font-size:15px;transition:all .18s;active-scale:.95}
.btn:active{transform:scale(.95)}
.btn:disabled{opacity:.35;cursor:not-allowed;transform:none!important}

.btn-primary{
  background:var(--green);color:#fff;
  padding:16px 28px;border-radius:16px;font-size:16px;font-weight:700;
  box-shadow:0 4px 24px rgba(0,230,118,.25);
  width:100%;
}
body.light .btn-primary{color:#fff;box-shadow:0 4px 24px rgba(0,168,68,.2)}
.btn-primary:hover{box-shadow:0 6px 32px rgba(0,230,118,.35);transform:translateY(-1px)}
.btn-primary:active{transform:scale(.97)}

.btn-secondary{
  background:var(--bg3);border:1.5px solid var(--border2);
  color:var(--text2);padding:13px 20px;border-radius:14px;font-size:14px;
  width:100%;
}
.btn-secondary:hover{border-color:var(--border3);color:var(--text)}
.btn-ghost{background:none;color:var(--text3);padding:8px;font-size:13px;font-weight:600}
.btn-ghost:hover{color:var(--text2)}
.btn-danger{background:var(--red-bg);border:1px solid var(--red-border);color:var(--red);padding:10px 16px;border-radius:var(--r-sm);font-size:13px}

/* CHIPS */
.chip{
  display:inline-flex;align-items:center;gap:5px;
  padding:8px 14px;border-radius:50px;
  font-size:13px;font-weight:600;
  border:1.5px solid var(--border2);color:var(--text3);
  cursor:pointer;transition:all .15s;white-space:nowrap;
  background:var(--bg2);
}
.chip:hover{border-color:var(--border3);color:var(--text2)}
.chip.active{background:var(--green);border-color:var(--green);color:#fff}
body.light .chip.active{color:#fff}
.chip.disabled{opacity:.3;pointer-events:none}

/* ALTERNATIVAS */
.alt{
  display:flex;align-items:flex-start;gap:14px;
  padding:16px;border-radius:16px;
  border:2px solid var(--border);background:var(--bg2);
  cursor:pointer;transition:all .2s;
  text-align:left;width:100%;color:var(--text);
  font-size:14px;font-family:var(--sans);
}
.alt:active{transform:scale(.98)}
.alt.sel{border-color:var(--green);background:var(--green-bg)}
.alt.corr{border-color:var(--green);background:var(--green-bg)}
.alt.err{border-color:var(--red);background:var(--red-bg)}
.alt.dim{opacity:.2;pointer-events:none}
.alt-letra{
  min-width:32px;height:32px;border-radius:10px;
  display:flex;align-items:center;justify-content:center;
  font-size:12px;font-weight:800;font-family:var(--mono);
  flex-shrink:0;background:var(--bg3);color:var(--text3);
  transition:all .2s;
}
.alt.sel .alt-letra{background:var(--green);color:#fff}
.alt.corr .alt-letra{background:var(--green);color:#fff}
.alt.err .alt-letra{background:var(--red);color:#fff}

/* PROGRESSO */
.prog-track{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden}
.prog-fill{height:100%;border-radius:3px;transition:width .5s cubic-bezier(.4,0,.2,1)}

/* HEADER DE PÁGINA */
.page-header{
  position:sticky;top:0;z-index:50;
  padding:14px 20px;
  display:flex;align-items:center;justify-content:space-between;
}

/* ANIMAÇÕES */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes pop{0%{transform:scale(1)}40%{transform:scale(1.12)}100%{transform:scale(1)}}
@keyframes shake{0%{transform:translateX(0)}20%{transform:translateX(-6px)}40%{transform:translateX(6px)}60%{transform:translateX(-4px)}80%{transform:translateX(4px)}100%{transform:translateX(0)}}
@keyframes celebrate{0%{transform:scale(1) rotate(0deg)}30%{transform:scale(1.2) rotate(-3deg)}60%{transform:scale(1.15) rotate(3deg)}100%{transform:scale(1) rotate(0deg)}}
@keyframes slideUp{from{opacity:0;transform:translateY(100%)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-20px)}to{opacity:1;transform:translateY(0)}}

.fade-up{animation:fadeUp .35s cubic-bezier(.4,0,.2,1) both}
.fade-in{animation:fadeIn .3s ease both}
.pop{animation:pop .3s ease both}
.shake{animation:shake .4s ease both}

/* LOADER SPINNER */
.ring{width:36px;height:36px;border:3px solid var(--border2);border-top-color:var(--green);border-radius:50%;animation:spin .7s linear infinite}

/* FEEDBACK OVERLAY */
#feedback-overlay{
  position:fixed;inset:0;pointer-events:none;z-index:200;
  display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .15s;
}
#feedback-overlay.show{opacity:1}
.feedback-emoji{font-size:80px;animation:celebrate .6s ease both}

/* STREAK FLAME */
@keyframes flicker{0%,100%{transform:scaleY(1)}50%{transform:scaleY(1.08)}}

/* XP POPUP */
.xp-popup{
  position:fixed;top:80px;right:20px;z-index:300;
  background:var(--green);color:#fff;
  font-family:var(--mono);font-weight:800;font-size:15px;
  padding:8px 16px;border-radius:50px;
  animation:slideDown .3s ease both, fadeIn .3s ease both;
  pointer-events:none;
}

/* BOTTOM SHEET */
.bottom-sheet{
  position:fixed;bottom:0;left:0;right:0;z-index:150;
  background:var(--bg2);border-top:1px solid var(--border2);
  border-radius:24px 24px 0 0;
  padding:20px 20px calc(20px + var(--safe-b));
  animation:slideUp .35s cubic-bezier(.4,0,.2,1) both;
  max-height:80vh;overflow-y:auto;
}
.sheet-handle{width:40px;height:4px;background:var(--border2);border-radius:2px;margin:0 auto 20px}

/* INPUT */
.inp{
  width:100%;background:var(--bg3);border:1.5px solid var(--border2);
  border-radius:14px;padding:14px 16px;color:var(--text);
  font-size:15px;font-family:var(--sans);transition:border-color .2s;
}
.inp:focus{border-color:var(--green)}
.inp::placeholder{color:var(--text3)}

/* NÍVEL BADGE */
.lvl-badge{
  display:inline-flex;align-items:center;gap:6px;
  padding:4px 10px;border-radius:50px;
  font-size:11px;font-weight:700;font-family:var(--mono);
}

/* HINT */
.hint-card{
  background:rgba(68,138,255,.08);border:1px solid rgba(68,138,255,.2);
  border-radius:14px;padding:14px 16px;margin-bottom:12px;
}
.hint-line{font-size:13px;color:rgba(68,138,255,.9);line-height:1.6;padding-left:10px;border-left:2px solid rgba(68,138,255,.3);margin-bottom:6px}

/* PROF CARD */
.prof-card{
  display:flex;gap:12px;align-items:flex-start;
  background:rgba(224,64,251,.06);border:1px solid rgba(224,64,251,.15);
  border-radius:14px;padding:14px;
}

/* RANKING */
.rank-row{display:flex;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.rank-row:last-child{border-bottom:none}
.rank-row.me{background:var(--green-bg);margin:0 -16px;padding:12px 16px;border-radius:12px;border-bottom:none}
</style>
</head>

function setTema(light){
  document.body.classList.toggle('light', light);
  document.querySelector('meta[name=theme-color]').content = light ? '#f5f5f7' : '#0a0a0f';
  try{localStorage.setItem(LS_TEMA, light?'light':'dark');}catch(e){}
}
function toggleTema(){setTema(!document.body.classList.contains('light'));renderNav();}
(function(){try{if(localStorage.getItem(LS_TEMA)==='light')setTema(true);}catch(e){}})();

const $ = id => document.getElementById(id);
const esc = s => (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
function shufl(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function getFoto(p){return p?.foto_url||p?.avatar_url||AVATAR;}
function getLvl(){const x=getXP();for(let i=NIVEIS.length-1;i>=0;i--)if(x>=NIVEIS[i].min)return NIVEIS[i];return NIVEIS[0];}
function getXP(){return PERFIL?.xp||0;}
function getGS(){
  let ok=0,no=0;
  BANCO.forEach(q=>{const a=S.ans[q.id];if(a===q.ans)ok++;else if(a)no++;});
  return{ok,no,tot:BANCO.length,na:BANCO.length-ok-no,pct:ok+no>0?Math.round(ok/(ok+no)*100):0};
}
function getSS(){
  let ok=0,no=0;
  S.fQ.forEach(q=>{const a=S.sessionAns[q.id];if(a===q.ans)ok++;else if(a)no++;});
  return{ok,no,tot:S.fQ.length,pct:ok+no>0?Math.round(ok/(ok+no)*100):0};
}
function getQF(){
  let f=BANCO;
  if(S.banca!=='all')f=f.filter(q=>q.banca===S.banca);
  if(S.topico!=='all')f=f.filter(q=>q.topic===S.topico);
  if(S.ordem==='recentes')f=[...f].sort((a,b)=>(b.ano||0)-(a.ano||0));
  else if(S.ordem==='antigas')f=[...f].sort((a,b)=>(a.ano||0)-(b.ano||0));
  return f;
}
function pctCor(p){return p>=70?'var(--green)':p>=50?'var(--yellow)':'var(--red)';}
function streakIcon(d){return d>=30?'🔥':d>=14?'⚡':d>=7?'✨':d>=3?'💪':'🌱';}

const NAV_SCREENS = ['home','quiz-setup','aprender','dashboard','leaderboard','perfil'];

function go(scr){S.scr=scr;render();}
function navTo(scr){
  if(scr==='quiz-setup'){S.sel=null;S.conf=false;}
  go(scr);
}

function renderNav(){
  const showNav = !['login','quiz'].includes(S.scr);
  $('nav-bar').style.display = showNav ? 'flex' : 'none';
  $('app').classList.toggle('no-nav', !showNav);
  NAV_IDS.forEach((id,i)=>$(id)?.classList.toggle('active', S.scr===NAV_SCREENS[i]||
    (S.scr==='amigos'&&i===4)||(S.scr==='clan'&&i===4)||(S.scr==='dash'&&i===0)));
  // Avatar na nav
  const wrap = $('nav-avatar-wrap');

    wrap.innerHTML = `<img src="${getFoto(PERFIL)}" style="width:24px;height:24px;border-radius:50%;border:2px solid var(--green);object-fit:cover">`;
  }
}

function render(){
  renderNav();
  const screens = {
    login: renderLogin,
    home: renderHome,
    aprender: renderAprender,
    licao: renderLicao,
    'quiz-setup': renderQuizSetup,
    quiz: renderQuiz,
    dash: renderDash,
    dashboard: renderDashboard,
    perfil: renderPerfil,
    amigos: renderAmigos,
    leaderboard: renderLeaderboard,
    clan: renderClan,
  };
  (screens[S.scr]||renderHome)();
}

function showFeedback(ok){
  const ov=$('feedback-overlay');
  const em=$('feedback-emoji');
  em.textContent = ok ? ['🎉','✅','⭐','🔥','💯'][Math.floor(Math.random()*5)] : ['❌','😬','💪','🔄'][Math.floor(Math.random()*4)];
  em.className='feedback-emoji';
  void em.offsetWidth; // force reflow
  em.className='feedback-emoji ' + (ok?'pop':'shake');
  ov.classList.add('show');
  setTimeout(()=>ov.classList.remove('show'),800);
}

function showXPPopup(xp){
  const el=document.createElement('div');
  el.className='xp-popup';
  el.textContent=`+${xp} XP`;
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),1500);
}

function timerStr(){const m=Math.floor(S.timerSec/60),s=S.timerSec%60;return String(m).padStart(2,'0')+':'+String(s).padStart(2,'0');}
function timerCor(){return S.timerSec>300?'var(--green)':S.timerSec>60?'var(--yellow)':'var(--red)';}
function pararTimer(){if(S.timerInterval){clearInterval(S.timerInterval);S.timerInterval=null;}S.timerAtivo=false;}
function iniciarTimer(){
  pararTimer();S.timerAtivo=true;
  S.timerInterval=setInterval(()=>{
    if(!S.timerAtivo)return;
    S.timerSec--;
    const el=$('timer-disp');
    if(el){el.textContent=timerStr();el.style.color=timerCor();}
    if(S.timerSec<=0){pararTimer();alert('⏱ Tempo esgotado!');go('dash');}
  },1000);
}

async function carregarPerfil(userId){

// ─── PERFIL: EDITAR ───────────────────────────────────────────────────────────
async function salvarPerfil(nome, bio){
  if(!USER) return;
  const {error} = await sb.from('usuarios')
    .update({nome: nome.trim(), bio: bio.trim()})
    .eq('id', USER.id);
  if(error){alert('Erro ao salvar: '+error.message);return;}
  PERFIL.nome = nome.trim();
  PERFIL.bio = bio.trim();
  alert('Perfil salvo!');
  render();
}

async function uploadFoto(file){
  if(!USER || !file) return;
  const ext = file.name.split('.').pop();
  const path = USER.id+'/avatar.'+ext;
  const {error: upErr} = await sb.storage.from('avatars').upload(path, file, {upsert:true});
  if(upErr){alert('Erro no upload: '+upErr.message);return;}
  const {data:{publicUrl}} = sb.storage.from('avatars').getPublicUrl(path);
  await sb.from('usuarios').update({foto_url: publicUrl}).eq('id', USER.id);
  PERFIL.foto_url = publicUrl;
  render();
}

function fotoAtual(){
  return PERFIL?.foto_url || PERFIL?.avatar_url || AVATAR;
}

let AMIGOS_CACHE = null;
let PENDENTES_CACHE = null;

async function carregarAmigos(){
  if(!USER) return;
  const {data} = await sb.from('amizades')
    .select('id, status, solicitante_id, destinatario_id, usuarios!amizades_solicitante_id_fkey(id,nome,foto_url,avatar_url,xp,streak_dias,codigo_amigo), usuarios!amizades_destinatario_id_fkey(id,nome,foto_url,avatar_url,xp,streak_dias,codigo_amigo)')
    .or('solicitante_id.eq.'+USER.id+',destinatario_id.eq.'+USER.id);
  
  if(!data){AMIGOS_CACHE=[];PENDENTES_CACHE=[];return;}
  
  AMIGOS_CACHE = data
    .filter(a=>a.status==='aceita')
    .map(a=>{
      const amigo = a.solicitante_id===USER.id
        ? a['usuarios!amizades_destinatario_id_fkey']
        : a['usuarios!amizades_solicitante_id_fkey'];
      return{...amigo, amizade_id: a.id};
    });

  PENDENTES_CACHE = data
    .filter(a=>a.status==='pendente' && a.destinatario_id===USER.id)
    .map(a=>({...a['usuarios!amizades_solicitante_id_fkey'], amizade_id: a.id}));
}

async function adicionarAmigo(codigo){
  if(!USER) return;
  codigo = codigo.trim().toUpperCase();
  if(!codigo){alert('Digite o código do amigo.');return;}
  
  const {data: dest, error} = await sb.from('usuarios')
    .select('id,nome').eq('codigo_amigo', codigo).single();
  
  if(error || !dest){alert('Código não encontrado. Verifique e tente novamente.');return;}

async function salvarResposta(questaoId, acertou){
  if(!USER) return;
  await sb.from('progresso').upsert({
    usuario_id: USER.id,
    questao_id: String(questaoId),   // ID estável tipo MPxxxxxxxx
    acertou: acertou,
    respondido_em: new Date().toISOString()
  }, {onConflict: 'usuario_id,questao_id'});

  // Atualiza XP no perfil
  const xpGanho = acertou ? 10 : 0;
  if(xpGanho > 0 && PERFIL) {
    const novoXP = (PERFIL.xp || 0) + xpGanho;
    await sb.from('usuarios').update({xp: novoXP}).eq('id', USER.id);
    PERFIL.xp = novoXP;
    // Atualiza XP no clã se for membro
    if(MEU_CLA) {
      await sb.from('clan_membros').update({
        xp_contribuido: (MEU_CLA.xp_contribuido||0) + xpGanho
      }).eq('clan_id', MEU_CLA.clan_id).eq('usuario_id', USER.id);
      MEU_CLA.xp_contribuido = (MEU_CLA.xp_contribuido||0) + xpGanho;
    }
  }
  // Atualiza streak
  await atualizarStreakDB();
}

async function toggleFavorito(questaoId){
  if(!USER) return;
  if(S.favs[questaoId]){
    await sb.from('favoritos').delete().eq('usuario_id', USER.id).eq('questao_id', questaoId);
    S.favs[questaoId] = false;
  } else {
    await sb.from('favoritos').insert({usuario_id: USER.id, questao_id: questaoId});
    S.favs[questaoId] = true;
  }
}

async function atualizarStreakDB(){
  if(!USER || !PERFIL) return;
  const hoje = new Date().toISOString().slice(0,10);
  if(PERFIL.streak_ultimo === hoje) return;
  const ontem = new Date(Date.now()-86400000).toISOString().slice(0,10);
  const novosDias = PERFIL.streak_ultimo === ontem ? (PERFIL.streak_dias||0)+1 : 1;
  const novoRecorde = Math.max(novosDias, PERFIL.streak_recorde||0);
  await sb.from('usuarios').update({
    streak_dias: novosDias,
    streak_recorde: novoRecorde,
    streak_ultimo: hoje
  }).eq('id', USER.id);
  PERFIL.streak_dias = novosDias;
  PERFIL.streak_recorde = novoRecorde;
  PERFIL.streak_ultimo = hoje;
}

// ─── QUIZ ACTIONS ─────────────────────────────────────────────────────────────
function startQuiz(tipo, qtdOverride){
  let f;
  if(tipo==='erradas') f=BANCO.filter(q=>S.ans[q.id]&&S.ans[q.id]==='__errado__');
  else if(tipo==='favs') f=BANCO.filter(q=>S.favs[q.id]);
  else f=getQF();
  if(!f.length){alert('Nenhuma questão com esse filtro.');return;}
  // Prioriza não respondidas
  const novas=shufl(f.filter(q=>!S.ans[q.id]));
  const feitas=shufl(f.filter(q=>S.ans[q.id]));
  f=[...novas,...feitas];
  const n=qtdOverride||(S.qtd>0&&S.qtd<f.length?S.qtd:f.length);
  f=f.slice(0,n);
  if(S.shuffleOpts)f=f.map(shuffleQOpts);
  S.fQ=f;S.idx=0;S.sel=null;S.conf=false;S.showExp=false;S.hintIdx=0;S.sessionAns={};
  pararTimer();
  if(S.modoProva){S.timerSec=S.tempoProva*60;S.scr='quiz';render();iniciarTimer();}
  else{S.scr='quiz';render();}
}

function shuffleQOpts(q){
  const sh=shufl(q.opts).map((o,i)=>({...o,origL:o.l,l:'ABCDE'[i]}));
  const newAns=sh.find(o=>o.origL===q.ans)?.l||q.ans;
  const newW={};sh.forEach(o=>{if(q.exp.w[o.origL])newW[o.l]=q.exp.w[o.origL];});
  return{...q,opts:sh,ans:newAns,exp:{...q.exp,w:newW}};
}

function goQ(i){S.idx=i;const q=S.fQ[i];S.sel=S.ans[q.id]&&S.ans[q.id]!=='__errado__'?S.ans[q.id]:null;S.conf=!!S.ans[q.id];S.showExp=false;S.hintIdx=0;render();}

async function confirmar(){
  if(!S.sel)return;
  S.conf=true;
  const q=S.fQ[S.idx];
  const acertou=S.sel===q.ans;
  S.ans[q.id]=acertou?S.sel:'__errado__';
  S.sessionAns[q.id]=S.sel;
  render();
  await salvarResposta(q.id, acertou);
}

function mostrarDica(){const q=S.fQ[S.idx];if(S.hintIdx<(q.hints?.length||0)){S.hintIdx++;render();}}

function go(scr){S.scr=scr;render();}

// QUIZ ACTIONS
// ═══════════════════════════════════════════════════════════════════
function startQuiz(tipo, qtdOverride){
  let f;
  if(tipo==='erradas') f=BANCO.filter(q=>S.ans[q.id]==='__errado__');
  else if(tipo==='favs') f=BANCO.filter(q=>S.favs[q.id]);
  else f=getQF();
  if(!f.length){alert('Nenhuma questão com esse filtro.');return;}
  const novas=shufl(f.filter(q=>!S.ans[q.id]));
  const feitas=shufl(f.filter(q=>S.ans[q.id]));
  f=[...novas,...feitas];
  const n=qtdOverride||(S.qtd>0&&S.qtd<f.length?S.qtd:f.length);
  f=f.slice(0,n);
  if(S.shuffleOpts)f=f.map(shuffleQOpts);
  S.fQ=f;S.idx=0;S.sel=null;S.conf=false;S.showExp=false;S.hintIdx=0;S.sessionAns={};
  pararTimer();
  if(S.modoProva){S.timerSec=S.tempoProva*60;go('quiz');iniciarTimer();}
  else go('quiz');
}

function shuffleQOpts(q){
  const sh=shufl(q.opts).map((o,i)=>({...o,origL:o.l,l:'ABCDE'[i]}));
  const newAns=sh.find(o=>o.origL===q.ans)?.l||q.ans;
  const newW={};sh.forEach(o=>{if(q.exp.w[o.origL])newW[o.l]=q.exp.w[o.origL];});
  return{...q,opts:sh,ans:newAns,exp:{...q.exp,w:newW}};
}

function goQ(i){
  S.idx=i;const q=S.fQ[i];
  S.sel=S.ans[q.id]&&S.ans[q.id]!=='__errado__'?S.ans[q.id]:null;
  S.conf=!!S.ans[q.id];S.showExp=false;S.hintIdx=0;render();
}

async function confirmar(){
  if(!S.sel)return;
  S.conf=true;
  const q=S.fQ[S.idx];
  const ok=S.sel===q.ans;
  S.ans[q.id]=ok?S.sel:'__errado__';
  S.sessionAns[q.id]=S.sel;
  showFeedback(ok);
  if(ok)showXPPopup(10);
  render();
  await salvarResposta(q.id, ok);
}

function mostrarDica(){const q=S.fQ[S.idx];if(S.hintIdx<(q.hints?.length||0)){S.hintIdx++;render();}}

function favToggle(id){
  toggleFavorito(id).then(()=>{
    const btn=$('fav-btn');
    if(btn)btn.textContent=S.favs[id]?'⭐':'☆';
  });
}

function copiarCodigo(btn){
  if(!MEU_CLA)return;
  navigator.clipboard.writeText(MEU_CLA.codigo_convite).then(()=>{
    btn.textContent='✓ Copiado!';
    setTimeout(()=>btn.textContent='📋 Copiar',2000);
  });
}

      <div style="text-align:center;padding:10px 14px;background:var(--bg3);border-radius:12px">
        <div style="font-family:var(--mono);font-size:18px;font-weight:800">${PERFIL?.streak_recorde||0}d</div>
        <div style="font-size:9px;color:var(--text3);font-weight:700">RECORDE</div>
      </div>
    </div>`:``}

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:16px">
      ${[{n:gs.ok,l:'Acertos',c:'var(--green)'},{n:gs.no,l:'Erros',c:'var(--red)'},{n:gs.na,l:'Restantes',c:'var(--text3)'}].map(x=>`
      <div class="card fade-up" style="padding:16px;text-align:center">
        <div style="font-family:var(--mono);font-size:28px;font-weight:800;color:${x.c}">${x.n}</div>
        <div style="font-size:9px;color:var(--text3);font-weight:700;text-transform:uppercase;margin-top:4px">${x.l}</div>
      </div>`).join('')}
    </div>

    <!-- Por tópico -->
    ${Object.entries(porT).filter(([,s])=>s.ok+s.no>0).length>0?`
    <div class="card fade-up" style="padding:20px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px">Por Assunto</div>
      ${Object.entries(porT).filter(([,s])=>s.ok+s.no>0).map(([t,s])=>{
        const info=TC[t]||{cor:'var(--green)',icon:'📌'};
        return`<div style="margin-bottom:14px">
          <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px">
            <span style="font-size:13px;font-weight:700">${info.icon} ${t}</span>
            <div style="display:flex;align-items:center;gap:10px">
              <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">${s.ok+s.no}/${s.tot}</span>
              ${s.pct!==null?`<span style="font-family:var(--mono);font-size:13px;font-weight:700;color:${pctCor(s.pct)}">${s.pct}%</span>`:''}
            </div>
          </div>
          <div class="prog-track"><div class="prog-fill" style="width:${s.pct||0}%;background:${info.cor}"></div></div>
        </div>`;
      }).join('')}
    </div>`:``}

    <!-- Sessão atual -->
    ${ss.ok+ss.no>0?`
    <div class="card fade-up" style="padding:16px;margin-bottom:16px">
      <div style="font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px">Sessão atual</div>
      <div style="display:flex;align-items:center;gap:20px">
        <span style="font-size:15px;font-weight:700;color:var(--green)">✓ ${ss.ok}</span>
        <span style="font-size:15px;font-weight:700;color:var(--red)">✕ ${ss.no}</span>
        <span style="font-family:var(--mono);font-size:18px;font-weight:800;color:${pctCor(ss.pct)}">${ss.pct}%</span>
      </div>
    </div>`:``}

    <div style="display:flex;gap:10px">
      <button onclick="navTo('quiz-setup')" class="btn-primary" style="flex:2;padding:15px">Continuar →</button>
      ${gs.no>0?`<button onclick="startQuiz('erradas')" class="btn-secondary" style="flex:1;padding:15px">🔄 ${gs.no}</button>`:''}
    </div>
  </div>
</div>`;
}

async function renderLeaderboard(){
  $('app').innerHTML=`
<div style="background:var(--bg);min-height:100vh">
  <div class="glass page-header">
    <div style="font-size:16px;font-weight:800">🏆 Ranking</div>

  try{geral=await getLeaderboardGeral();}catch(e){}
  try{if(AMIGOS.length>0)amigos=await getLeaderboardAmigos();}catch(e){}
  try{if(MEU_CLA)cla=await getLeaderboardCla(MEU_CLA.clan_id);}catch(e){}

  const abas=[['geral','🌎 Geral'],['amigos','👥 Amigos'],['cla','🏆 Clã']];

  function renderLista(lista){
    if(!lista||lista.length===0) return`<div style="text-align:center;padding:32px 0;color:var(--text3)">Nenhum dado ainda</div>`;
    return lista.map((m,i)=>{
      const isMe=m.id===USER?.id||m.usuario_id===USER?.id;
      const medal=i===0?'🥇':i===1?'🥈':i===2?'🥉':'';
      const pos=m.posicao||i+1;
      return`<div class="rank-row ${isMe?'me':''}">
        <div style="font-family:var(--mono);font-size:14px;font-weight:800;min-width:32px;text-align:center;color:var(--text3)">${medal||'#'+pos}</div>
        <img src="${m.foto||m.avatar_url||AVATAR}" style="width:40px;height:40px;border-radius:12px;object-fit:cover;flex-shrink:0">
        <div style="flex:1;min-width:0">
          <div style="font-size:14px;font-weight:700;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;${isMe?'color:var(--green)':''}">${esc(m.nome||'Usuário')}${isMe?' (você)':''}</div>
          <div style="font-size:11px;color:var(--text3)">🔥 ${m.streak_dias||0}d</div>
        </div>
        <div style="text-align:right;flex-shrink:0">
          <div style="font-family:var(--mono);font-size:16px;font-weight:800;color:var(--yellow)">${m.xp||m.xp_contribuido||0}</div>
          <div style="font-size:9px;color:var(--text3);font-weight:700">XP</div>
        </div>
      </div>`;
    }).join('');
  }

  $('app').innerHTML=`
<div style="background:var(--bg);min-height:100vh">
  <div class="glass page-header">
    <div style="font-size:16px;font-weight:800">🏆 Ranking</div>
    <div style="width:40px"></div>
  </div>

  <div style="padding:20px;max-width:480px;margin:0 auto">

    <!-- Abas -->
    <div style="display:flex;gap:6px;margin-bottom:20px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;padding:4px">
      ${abas.map(([id,label])=>`
      <button onclick="S.lbAba='${id}';renderLeaderboard()" style="
        flex:1;padding:10px 6px;border-radius:12px;font-size:13px;font-weight:700;
        background:${S.lbAba===id?'var(--green)':'transparent'};
        color:${S.lbAba===id?'#fff':'var(--text3)'};
        border:none;cursor:pointer;transition:all .2s;font-family:var(--sans);
      ">${label}</button>`).join('')}
    </div>

    <!-- Lista -->
    <div class="card" style="padding:0 16px">
      ${renderLista(dados[S.lbAba])}
    </div>
  </div>
</div>`;
}

function setBanca(idx){S.banca=idx===-1?'all':(BANCAS_LIST[idx]||'all');S.topico='all';render();}
function setTopico(idx){S.topico=idx===-1?'all':(TOPICOS_LIST[idx]||'all');render();}
function setOrdem(idx){S.ordem=['padrao','recentes','antigas'][idx]||'padrao';render();}
function setQtd(idx){S.qtd=[10,20,30,50][idx]||20;render();}
function removerAmizade(id){removerAmigo(id);}
function removerAmigo(id){
  if(!confirm('Remover este amigo?'))return;
  sb.from('amizades').delete().eq('id',id).then(()=>{carregarAmigos().then(()=>render());});
}

async function carregarPerfil(uid){const {data}=await sb.from('usuarios').select('*').eq('id',uid).single();PERFIL=data;}
async function carregarProgresso(uid){
  const {data}=await sb.from('progresso').select('questao_id,acertou').eq('usuario_id',uid);
  S.ans={};
  if(data)data.forEach(r=>{const q=BANCO.find(q=>String(q.id)===String(r.questao_id));if(q)S.ans[String(r.questao_id)]=r.acertou?q.ans:'__errado__';});
}
async function carregarFavoritos(uid){
  const {data}=await sb.from('favoritos').select('questao_id').eq('usuario_id',uid);
  S.favs={};if(data)data.forEach(r=>S.favs[String(r.questao_id)]=true);
}
async function carregarAmigos(){
  const uid=USER?.id;if(!uid)return;
  const {data}=await sb.from('amizades').select('*,solicitante:solicitante_id(id,nome,avatar_url,xp,streak_dias),destinatario:destinatario_id(id,nome,avatar_url,xp,streak_dias)').or(`solicitante_id.eq.${uid},destinatario_id.eq.${uid}`);
  AMIGOS=(data||[]).filter(a=>a.status==='aceita');
  PENDENTES=(data||[]).filter(a=>a.status==='pendente'&&a.destinatario_id===uid);
}
async function carregarMeuCla(uid){
  const {data}=await sb.from('clan_membros').select('clan_id,xp_contribuido,clans(id,nome,descricao,codigo_convite)').eq('usuario_id',uid).single();
  MEU_CLA=data?{...data,...data.clans}:null;
}
async function salvarResposta(qid,acertou){
  if(!USER)return;
  await sb.from('progresso').upsert({usuario_id:USER.id,questao_id:String(qid),acertou,respondido_em:new Date().toISOString()},{onConflict:'usuario_id,questao_id'});
  if(acertou&&PERFIL){
    const nxp=(PERFIL.xp||0)+10;
    await sb.from('usuarios').update({xp:nxp}).eq('id',USER.id);PERFIL.xp=nxp;
    if(MEU_CLA){await sb.from('clan_membros').update({xp_contribuido:(MEU_CLA.xp_contribuido||0)+10}).eq('clan_id',MEU_CLA.clan_id).eq('usuario_id',USER.id);MEU_CLA.xp_contribuido=(MEU_CLA.xp_contribuido||0)+10;}
  }
  await atualizarStreakDB();
}
async function atualizarStreakDB(){
  if(!USER||!PERFIL)return;
  const hoje=new Date().toISOString().slice(0,10);
  if(PERFIL.streak_ultimo===hoje)return;
  const ontem=new Date(Date.now()-86400000).toISOString().slice(0,10);
  const nd=PERFIL.streak_ultimo===ontem?(PERFIL.streak_dias||0)+1:1;
  const nr=Math.max(nd,PERFIL.streak_recorde||0);
  await sb.from('usuarios').update({streak_dias:nd,streak_recorde:nr,streak_ultimo:hoje}).eq('id',USER.id);
  PERFIL.streak_dias=nd;PERFIL.streak_recorde=nr;PERFIL.streak_ultimo=hoje;
}
async function toggleFavorito(qid){
  if(!USER)return;
  if(S.favs[qid]){await sb.from('favoritos').delete().eq('usuario_id',USER.id).eq('questao_id',String(qid));S.favs[qid]=false;}
  else{await sb.from('favoritos').insert({usuario_id:USER.id,questao_id:String(qid)});S.favs[qid]=true;}
}
async function salvarPerfil(){
  if(!USER)return;
  const nome=$('edit-nome')?.value.trim();
  const bio=$('edit-bio')?.value.trim();
  await sb.from('usuarios').update({nome,bio}).eq('id',USER.id);
  if(PERFIL){PERFIL.nome=nome;PERFIL.bio=bio;}
  render();
}
async function uploadFoto(input){
  if(!input.files[0]||!USER)return;
  const file=input.files[0];
  const ext=file.name.split('.').pop();
  const path=`${USER.id}/avatar.${ext}`;
  const {data,error}=await sb.storage.from('avatares').upload(path,file,{upsert:true});
  if(error){alert('Erro: '+error.message);return;}
  const {data:{publicUrl}}=sb.storage.from('avatares').getPublicUrl(path);
  await sb.from('usuarios').update({foto_url:publicUrl+'?t='+Date.now()}).eq('id',USER.id);
  if(PERFIL)PERFIL.foto_url=publicUrl;
  render();
}
async function enviarSolicitacao(codigo){
  if(!codigo||!USER)return;
  const {data:dest}=await sb.from('usuarios').select('id,nome').eq('codigo_amigo',codigo.toUpperCase()).single();
  if(!dest){alert('Código não encontrado.');return;}
  if(dest.id===USER.id){alert('Esse é o seu próprio código!');return;}
  const {error}=await sb.from('amizades').insert({solicitante_id:USER.id,destinatario_id:dest.id});
  if(error){alert('Solicitação já enviada ou vocês já são amigos.');return;}
  alert(`Solicitação enviada para ${dest.nome}!`);
  await carregarAmigos();render();
}
async function aceitarAmizade(id){await sb.from('amizades').update({status:'aceita'}).eq('id',id);await carregarAmigos();render();}
async function recusarAmizade(id){await sb.from('amizades').delete().eq('id',id);await carregarAmigos();render();}
async function criarCla(nome,desc){
  if(!nome)return;
  const {data,error}=await sb.from('clans').insert({nome,descricao:desc,criador_id:USER.id}).select().single();
  if(error){alert('Erro: '+error.message);return;}
  await sb.from('clan_membros').insert({clan_id:data.id,usuario_id:USER.id});
  await carregarMeuCla(USER.id);go('clan');
}
async function entrarCla(codigo){
  if(!codigo)return;
  const {data:clan}=await sb.from('clans').select('id,nome').eq('codigo_convite',codigo.toUpperCase()).single();
  if(!clan){alert('Código inválido.');return;}
  const {error}=await sb.from('clan_membros').insert({clan_id:clan.id,usuario_id:USER.id});
  if(error){alert('Você já é membro deste clã.');return;}
  await carregarMeuCla(USER.id);go('clan');
}
async function sairCla(){
  if(!MEU_CLA||!confirm('Sair do clã?'))return;
  await sb.from('clan_membros').delete().eq('clan_id',MEU_CLA.clan_id).eq('usuario_id',USER.id);
  MEU_CLA=null;go('clan');
}
async function getRankingCla(cid){const {data}=await sb.from('clan_ranking').select('*').eq('clan_id',cid).order('posicao');return data||[];}
async function getLeaderboardGeral(){const {data}=await sb.from('leaderboard_geral').select('*').limit(50);return data||[];}
async function getLeaderboardAmigos(){
  const ids=AMIGOS.map(a=>a.solicitante_id===USER?.id?a.destinatario_id:a.solicitante_id);
  ids.push(USER?.id);
  const {data}=await sb.from('usuarios').select('id,nome,avatar_url,foto_url,xp,streak_dias').in('id',ids).order('xp',{ascending:false});
  return(data||[]).map((u,i)=>({...u,foto:u.foto_url||u.avatar_url,posicao:i+1}));
}

// BOOT
// ═══════════════════════════════════════════════════════════════════
function expand(r){
  return r.map(q=>({
    id:String(q.i),banca:q.b,topic:q.t,src:q.s,text:q.x,
    opts:q.o,ans:q.a,hints:q.h||[],ano:q.y||0,
    exp:{ok:q.e.ok||'',w:q.e.w||{},prof:q.e.p||''}
  }));
}

async function boot(){
  try{
    const r=await fetch('banco_v2.json');
    BANCO=expand(await r.json());
  }catch(e){
    $('loader').innerHTML=`
      <div style="font-family:var(--display);font-size:24px;font-weight:800">SPOL<span style="color:var(--green)">ADOR</span></div>
      <div style="color:var(--red);margin-top:16px;font-size:14px">⚠️ banco_v2.json não encontrado</div>
      <div style="color:var(--text3);font-size:12px;margin-top:8px;text-align:center;max-width:280px;line-height:1.6">Coloque o HTML e o banco_v2.json na mesma pasta e abra via servidor local.</div>`;
    return;
  }

  const {data:{session}}=await sb.auth.getSession();
  if(session){
    USER=session.user;
    await Promise.all([carregarPerfil(USER.id),carregarProgresso(USER.id),carregarFavoritos(USER.id),carregarMeuCla(USER.id),carregarAmigos()]);
    S.scr='home';
  } else {
    S.scr='login';
  }

  sb.auth.onAuthStateChange(async(event,session)=>{
    if(event==='SIGNED_IN'&&session){
      USER=session.user;
      await Promise.all([carregarPerfil(USER.id),carregarProgresso(USER.id),carregarFavoritos(USER.id),carregarMeuCla(USER.id),carregarAmigos()]);
      S.scr='home';
      $('loader').style.display='none';
      $('app').style.display='block';
      render();
    }
    if(event==='SIGNED_OUT'){go('login');}
  });

  $('loader').style.display='none';
  $('app').style.display='block';
  render();
}

boot();
</script>

function renderAprender(){
  const TRILHA = [
    {topico:"Proposições e Operadores",    nivel:"Básico",    seq:1,
     descricao:"O ponto de partida. Entenda o que é uma proposição e como os conectivos funcionam."},
    {topico:"Tabela-Verdade e Tautologia", nivel:"Básico",    seq:2,
     descricao:"Aprenda a construir tabelas-verdade e identificar tautologias e contradições."},
    {topico:"Equivalência e Negação",      nivel:"Intermediário", seq:3,
     descricao:"De Morgan, negação da condicional e contrapositiva — os mais cobrados em prova."},
    {topico:"Quantificadores e Diagramas", nivel:"Intermediário", seq:4,
     descricao:"Todo, algum, nenhum. Como negar e usar diagramas de Euler-Venn."},
    {topico:"Argumentos e Lógica",         nivel:"Intermediário", seq:5,
     descricao:"Modus Ponens, Tollens, Silogismo. Como validar argumentos formais."},
    {topico:"Associação e Problemas",      nivel:"Avançado",  seq:6,
     descricao:"Resolução sistemática de problemas com grade de associação."},
    {topico:"Matemática Básica",           nivel:"Avançado",  seq:7,
     descricao:"Combinatória, probabilidade e porcentagem aplicados a concursos."},
  ];

  const COR_NIVEL = {
    "Básico":        {bg:"#00e676", text:"#fff"},
    "Intermediário": {bg:"#ffd740", text:"#000"},
    "Avançado":      {bg:"#ff6d00", text:"#fff"},
  };

  // Calcula estado de cada etapa
  function getStatus(topico){
    const qs = BANCO.filter(q=>q.topic===topico);
    const feitas = qs.filter(q=>S.ans[q.id]).length;
    const acertos = qs.filter(q=>S.ans[q.id]===q.ans).length;
    const pct = qs.length>0 ? Math.round(feitas/qs.length*100) : 0;
    const pctAcerto = feitas>0 ? Math.round(acertos/feitas*100) : 0;
    const concluida = pct >= 20; // fez 20%+ das questões
    return {feitas, acertos, pct, pctAcerto, concluida, tot:qs.length};
  }

  // Calcula progresso geral da trilha
  const statusAll = TRILHA.map(e=>getStatus(e.topico));
  const totalConcluidas = statusAll.filter(s=>s.concluida).length;
  const pctTrilha = Math.round(totalConcluidas/TRILHA.length*100);

  $("app").innerHTML=`
<div style="background:var(--bg);min-height:100vh">

  <!-- Header -->
  <div class="glass page-header">
    <div style="font-size:16px;font-weight:800">🎓 Aprender</div>
    <button onclick="toggleTema()" style="background:var(--bg3);border:1px solid var(--border2);border-radius:10px;padding:7px 10px;font-size:15px">
      ${document.body.classList.contains("light")?"🌙":"☀️"}
    </button>
  </div>

  <div style="padding:0 20px 32px;max-width:480px;margin:0 auto">

    <!-- Progresso geral da trilha -->
    <div style="padding:20px 0 16px">
      <div style="display:flex;justify-content:space-between;align-items:flex-end;margin-bottom:10px">
        <div>
          <div style="font-size:13px;font-weight:800;margin-bottom:2px">Sua trilha de estudos</div>
          <div style="font-size:12px;color:var(--text3)">${totalConcluidas} de ${TRILHA.length} etapas concluídas</div>
        </div>
        <div style="font-family:var(--mono);font-size:22px;font-weight:900;color:var(--green)">${pctTrilha}%</div>
      </div>
      <div class="prog-track" style="height:8px;border-radius:4px">
        <div class="prog-fill" style="width:${pctTrilha}%;background:var(--green);border-radius:4px"></div>
      </div>
    </div>

    <!-- Legenda de níveis -->
    <div style="display:flex;gap:10px;margin-bottom:24px">
      ${Object.entries(COR_NIVEL).map(([n,c])=>`
      <div style="display:flex;align-items:center;gap:5px">
        <div style="width:10px;height:10px;border-radius:3px;background:${c.bg}"></div>
        <span style="font-size:11px;color:var(--text3);font-weight:600">${n}</span>
      </div>`).join("")}
    </div>

    <!-- TRILHA VISUAL -->
    <div style="position:relative">

      <!-- Linha vertical conectora -->
      <div style="position:absolute;left:35px;top:0;bottom:0;width:3px;background:var(--border2);z-index:0"></div>

      ${TRILHA.map((etapa, i)=>{
        const st = statusAll[i];
        const info = LICOES[etapa.topico];
        const cor = COR_NIVEL[etapa.nivel];
        const prev = i>0 ? statusAll[i-1] : null;
        // Bloqueia visualmente se a anterior não foi iniciada — mas deixa clicar
        const sugerida = i===0 || (prev && prev.feitas>0);

        return`
        <!-- Etapa ${i+1} -->
        <div style="display:flex;gap:16px;align-items:flex-start;margin-bottom:${i<TRILHA.length-1?"20":"0"}px;position:relative;z-index:1">

          <!-- Ícone da etapa (na linha) -->
          <div onclick="iniciarLicao(${i})" style="
            width:56px;height:56px;border-radius:18px;flex-shrink:0;cursor:pointer;
            background:${st.concluida?"var(--green)":sugerida?info?.cor+"22":"var(--bg3)"};
            border:3px solid ${st.concluida?"var(--green)":sugerida?info?.cor+"88":"var(--border)"};
            display:flex;align-items:center;justify-content:center;
            font-size:${st.concluida?"24":"28"}px;
            box-shadow:${st.concluida?"0 4px 20px rgba(0,230,118,.3)":sugerida?"0 4px 16px "+info?.cor+"33":"none"};
            transition:all .2s;
          ">${st.concluida?"✅":info?.emoji||"📌"}</div>

          <!-- Card da etapa -->
          <div onclick="iniciarLicao(${i})" style="
            flex:1;padding:16px 18px;border-radius:18px;cursor:pointer;
            background:${st.concluida?"var(--green-bg)":sugerida?"var(--bg2)":"var(--bg2)"};
            border:2px solid ${st.concluida?"var(--green-border)":sugerida?info?.cor+"33":"var(--border)"};
            transition:all .2s;
          " onmouseover="this.style.borderColor='${info?.cor||"var(--green)"}'" 
            onmouseout="this.style.borderColor='${st.concluida?"var(--green-border)":sugerida?info?.cor+"33":"var(--border)"}'">

            <!-- Header do card -->
            <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:6px">
              <div style="display:flex;align-items:center;gap:8px">
                <span style="font-size:11px;font-weight:800;padding:3px 9px;border-radius:50px;background:${cor.bg}22;color:${cor.bg === "#ffd740" ? "var(--yellow)" : cor.bg === "#ff6d00" ? "var(--orange)" : "var(--green)"}">
                  ${etapa.nivel}
                </span>
                <span style="font-size:10px;color:var(--text3);font-family:var(--mono)">Etapa ${etapa.seq}</span>
              </div>
              ${st.concluida?`<span style="font-size:11px;font-weight:800;color:var(--green);font-family:var(--mono)">${st.pctAcerto}% ✓</span>`:""}
            </div>

            <!-- Nome -->
            <div style="font-size:15px;font-weight:800;margin-bottom:4px;color:var(--text)">${etapa.topico}</div>

            <!-- Descrição -->
            <div style="font-size:12px;color:var(--text3);line-height:1.5;margin-bottom:${st.feitas>0?"10":"0"}px">${etapa.descricao}</div>

            <!-- Barra de progresso (se iniciou) -->
            ${st.feitas>0?`
            <div>
              <div class="prog-track" style="height:5px;border-radius:3px">
                <div class="prog-fill" style="width:${st.pct}%;background:${info?.cor||"var(--green)"}"></div>
              </div>
              <div style="font-size:10px;color:var(--text3);margin-top:4px;font-family:var(--mono)">${st.feitas}/${st.tot} questões · ${st.pct}%</div>
            </div>`:
            sugerida?`<div style="font-size:12px;color:${info?.cor||"var(--green)"};font-weight:700;margin-top:6px">▶ ${i===0&&st.feitas===0?"Começar aqui":"Iniciar lição"}</div>`:
            `<div style="font-size:12px;color:var(--text3);margin-top:4px">Conclua a etapa anterior primeiro (sugerido)</div>`
            }
          </div>
        </div>`;
      }).join("")}
    </div>

    <!-- Banner motivacional no fim -->
    ${totalConcluidas===TRILHA.length?`
    <div style="margin-top:24px;padding:20px;background:var(--green-bg);border:2px solid var(--green-border);border-radius:20px;text-align:center">
      <div style="font-size:40px;margin-bottom:8px">🏆</div>
      <div style="font-size:17px;font-weight:900;color:var(--green);margin-bottom:4px">Trilha completa!</div>
      <div style="font-size:13px;color:var(--text2)">Você concluiu todas as etapas. Agora pratique com questões reais!</div>
      <button onclick="navTo(\'quiz-setup\')" class="btn-primary" style="margin-top:16px;padding:14px;font-size:15px">

      </button>
    </div>`:
    totalConcluidas>0?`
    <div style="margin-top:24px;padding:16px 18px;background:var(--bg2);border:1px solid var(--border);border-radius:16px;display:flex;align-items:center;gap:12px">
      <span style="font-size:28px">🎯</span>
      <div>
        <div style="font-size:13px;font-weight:800;margin-bottom:2px">Continue de onde parou</div>
        <div style="font-size:12px;color:var(--text3)">Próxima etapa: <strong style="color:var(--text)">${TRILHA[totalConcluidas]?.topico||TRILHA[0].topico}</strong></div>
      </div>
    </div>`:""}

  </div>
</div>`;
}


function iniciarLicao(idx){
  S.licaoAtual = TOPICOS_LIST[idx];
  S.licaoEtapa = 0;
  S.licaoFlashcard = 0;
  S.licaoFlipped = false;
  S.licaoErros = [];
  // Pega 3 questões aleatórias do banco para fixação
  const qs = shufl(BANCO.filter(q=>q.topic===S.licaoAtual)).slice(0,3);
  S.licaoQuestoes = qs;
  S.licaoQIdx = 0;
  S.licaoSel = null;
  S.licaoConf = false;
  go('licao');
}

function renderLicao(){
  const topico = S.licaoAtual;
  const lic = LICOES[topico];
  if(!lic){go('aprender');return;}

  const steps = lic.steps;
  // Total de etapas = steps + questões de fixação
  const totalEtapas = steps.length + S.licaoQuestoes.length;
  const etapaAtual = S.licaoEtapa;
  const prog = Math.round((etapaAtual/totalEtapas)*100);

  // Se já passou de todas as etapas, mostra conclusão
  if(etapaAtual >= totalEtapas){
    renderLicaoConclusao();
    return;
  }

  // Verifica se é etapa de conteúdo ou questão
  const ehQuestao = etapaAtual >= steps.length;
  const qIdx = etapaAtual - steps.length;

  if(ehQuestao){
    renderLicaoQuestao(lic, qIdx, prog, totalEtapas);
    return;
  }

  const step = steps[etapaAtual];

  $('app').innerHTML=`
<div style="background:var(--bg);min-height:100vh;display:flex;flex-direction:column">

  <!-- Header -->
  <div style="padding:14px 16px;display:flex;align-items:center;gap:12px;flex-shrink:0">
    <button onclick="go('aprender')" style="background:none;font-size:22px;line-height:1;border:none;cursor:pointer;color:var(--text3)">✕</button>
    <div style="flex:1">
      <div class="prog-track" style="height:8px;border-radius:4px">
        <div class="prog-fill" style="width:${prog}%;background:${lic.cor};border-radius:4px"></div>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--text3);font-weight:700">${etapaAtual+1}/${totalEtapas}</div>
  </div>

  <!-- Conteúdo -->
  <div style="flex:1;overflow-y:auto;padding:16px;max-width:540px;width:100%;margin:0 auto">
    ${renderStep(step, lic)}
  </div>

  <!-- Botão Continuar fixo -->
  <div style="padding:16px;border-top:1px solid var(--border);flex-shrink:0">
    <button onclick="avancarLicao()" class="btn-primary" style="padding:17px;font-size:16px">
      ${etapaAtual===totalEtapas-1?'Finalizar lição ✓':'Continuar →'}
    </button>
  </div>
</div>`;

  // Ativa interatividade após render
  ativarInterativos(step);
}

function renderStep(step, lic){
  if(step.tipo==='intro') return renderStepIntro(step, lic);
  if(step.tipo==='conectivos') return renderStepConectivos(step, lic);
  if(step.tipo==='regras') return renderStepRegras(step, lic);
  if(step.tipo==='quantificadores') return renderStepQuantificadores(step, lic);
  if(step.tipo==='formas') return renderStepFormas(step, lic);
  if(step.tipo==='passos') return renderStepPassos(step, lic);
  if(step.tipo==='formulas') return renderStepFormulas(step, lic);
  if(step.tipo==='conceitos') return renderStepConceitos(step, lic);
  if(step.tipo==='tabela_condicional') return renderTabelaCondicional(lic);
  if(step.tipo==='flashcards') return renderStepFlashcards(step, lic);
  if(step.tipo==='interativo') return renderStepInterativo(step, lic);
  return `<div>Etapa desconhecida</div>`;
}

function renderStepInterativo(step, lic){
  // Para etapa interativa, o botão continuar avança internamente
  // Usa um estado temporário para saber qual pergunta estamos
  if(!window._interIdx) window._interIdx=0;
  if(!window._interSel) window._interSel=null;
  if(!window._interConf) window._interConf=false;

  const q = step.perguntas[window._interIdx];
  const totalPergs = step.perguntas.length;
  const isMulti = !!q.opts;

  return`
  <div class="fade-up">
    <div style="font-size:20px;font-weight:900;margin-bottom:6px">${step.titulo}</div>
    <div style="font-size:13px;color:var(--text3);margin-bottom:24px">Pergunta ${window._interIdx+1} de ${totalPergs}</div>

    <div style="padding:18px;background:var(--bg2);border:1.5px solid var(--border);border-radius:16px;margin-bottom:20px">
      <p style="font-size:15px;line-height:1.7;font-weight:500">${q.frase}</p>
    </div>

    ${isMulti?`
    <div style="display:flex;flex-direction:column;gap:10px;margin-bottom:16px">
      ${q.opts.map((opt,oi)=>{
        let bg='var(--bg2)', border='var(--border)', cor='var(--text)';
        if(window._interConf){
          if(oi===q.corr){bg='var(--green-bg)';border='var(--green)';cor='var(--green)';}
          else if(oi===window._interSel&&oi!==q.corr){bg='var(--red-bg)';border='var(--red)';cor='var(--red)';}
          else{bg='var(--bg2)';border='var(--border)';cor='var(--text3)';}
        } else if(window._interSel===oi){
          bg='rgba(68,138,255,.1)';border='var(--blue)';cor='var(--blue)';
        }
        return`<button onclick="${window._interConf?'':'interSelOpt('+oi+')'}" style="
          padding:14px 16px;border-radius:14px;border:2px solid ${border};
          background:${bg};color:${cor};font-size:14px;font-weight:600;
          text-align:left;cursor:${window._interConf?'default':'pointer'};
          transition:all .2s;font-family:var(--sans);width:100%;
        ">${opt}</button>`;
      }).join('')}
    </div>`:``}

    ${window._interConf?`
    <div style="padding:14px 16px;border-radius:14px;background:${window._interSel===q.corr?'var(--green-bg)':'var(--red-bg)'};border:1.5px solid ${window._interSel===q.corr?'var(--green-border)':'var(--red-border)'};margin-bottom:16px">
      <div style="font-size:13px;font-weight:800;color:${window._interSel===q.corr?'var(--green)':'var(--red)'};margin-bottom:4px">${window._interSel===q.corr?'✅ Correto!':'❌ Incorreto'}</div>
      <div style="font-size:13px;color:var(--text2);line-height:1.6">${q.exp}</div>
    </div>
    <button onclick="avancarInterativo(${totalPergs})" class="btn-primary" style="padding:16px">
      ${window._interIdx<totalPergs-1?'Próxima pergunta →':'Continuar →'}
    </button>
    `:
    window._interSel!==null?`<button onclick="confirmarInterativo()" class="btn-primary" style="padding:16px">Confirmar</button>`:
    `<div style="text-align:center;font-size:13px;color:var(--text3);padding:8px">Selecione uma opção acima</div>`}
  </div>`;
}

function interSelOpt(idx){window._interSel=idx;renderLicao();}
function confirmarInterativo(){window._interConf=true;renderLicao();}
function avancarInterativo(total){
  if(window._interIdx<total-1){
    window._interIdx++;window._interSel=null;window._interConf=false;renderLicao();
  } else {
    window._interIdx=0;window._interSel=null;window._interConf=false;
    avancarLicao();
  }
}

function flipCard(){S.licaoFlipped=!S.licaoFlipped;renderLicao();}
function proximoFlashcard(tipo, cardsStr, sabia){
  S.licaoFlipped=false;
  const cards=JSON.parse(cardsStr.replace(/&#39;/g,"'"));
  if(S.licaoFlashcard<cards.length-1){
    S.licaoFlashcard++;
    renderLicao();
  } else {
    S.licaoFlashcard=0;
    avancarLicao();
  }
}

function avancarLicao(){
  const lic=LICOES[S.licaoAtual];
  const totalEtapas=lic.steps.length+S.licaoQuestoes.length;
  S.licaoFlipped=false;
  window._interIdx=0;window._interSel=null;window._interConf=false;
  if(S.licaoEtapa<totalEtapas-1){S.licaoEtapa++;renderLicao();}
  else renderLicaoConclusao();
}

function ativarInterativos(step){
  // Hook para botão continuar na etapa interativa (desativa o botão padrão)
  if(step.tipo==='interativo'||step.tipo==='flashcards'){
    // O botão continuar não aparece — eles têm seu próprio fluxo
    const btnCont=document.querySelector('.btn-primary[onclick="avancarLicao()"]');
    if(btnCont&&(step.tipo==='flashcards'||step.tipo==='interativo'))btnCont.style.display='none';
  }
}

        <div class="prog-fill" style="width:${prog}%;background:${lic.cor};border-radius:4px"></div>
      </div>
    </div>
    <div style="font-family:var(--mono);font-size:12px;color:var(--text3)">Fixação ${qIdx+1}/${S.licaoQuestoes.length}</div>
  </div>

  <div style="flex:1;overflow-y:auto;padding:16px;max-width:540px;width:100%;margin:0 auto">

    <!-- Badge fixação -->
    <div style="display:inline-flex;align-items:center;gap:6px;padding:5px 12px;border-radius:50px;background:${lic.cor}18;border:1px solid ${lic.cor}44;font-size:11px;font-weight:800;color:${lic.cor};text-transform:uppercase;letter-spacing:.08em;margin-bottom:14px">
      ${lic.emoji} Fixação · ${S.licaoAtual}
    </div>

    <!-- Enunciado -->
    <div class="card" style="padding:18px;margin-bottom:14px">
      <div style="font-size:10px;color:var(--text3);font-weight:600;text-transform:uppercase;margin-bottom:8px">${esc(q.src)}</div>
      <p style="font-size:14px;line-height:1.75;white-space:pre-wrap">${esc(q.text)}</p>
    </div>

    <!-- Alternativas -->
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:14px">
      ${q.opts.map(o=>{
        const isAns=o.l===q.ans,isSel=S.licaoSel===o.l;
        let cls='alt';
        if(!S.licaoConf&&isSel)cls+=' sel';
        if(S.licaoConf&&isAns)cls+=' corr';
        else if(S.licaoConf&&isSel&&!isAns)cls+=' err';
        else if(S.licaoConf&&!isAns&&!isSel)cls+=' dim';
        const icon=S.licaoConf&&isAns?'✓':S.licaoConf&&isSel&&!isAns?'✕':o.l;
        return`<button class="${cls}" onclick="${S.licaoConf?'':'licaoSelAlt(\''+o.l+'\')'}" ${S.licaoConf?'disabled':''}>
          <span class="alt-letra">${icon}</span>
          <span style="font-size:14px;line-height:1.65;text-align:left">${esc(o.t)}</span>
        </button>`;
      }).join('')}
    </div>

    <!-- Feedback -->
    ${S.licaoConf?`
    <div style="padding:14px 16px;border-radius:14px;background:${isOk?'var(--green-bg)':'var(--red-bg)'};border:1.5px solid ${isOk?'var(--green-border)':'var(--red-border)'};margin-bottom:14px" class="fade-up">
      <div style="font-size:14px;font-weight:800;color:${isOk?'var(--green)':'var(--red)'};margin-bottom:${q.exp?.ok?'6':'0'}px">${isOk?'✅ Correto!':'❌ Gabarito: '+q.ans+') '+(correto?.t?.substring(0,40)||'')}</div>
      ${q.exp?.ok?`<p style="font-size:13px;line-height:1.65;color:var(--text2)">${esc(q.exp.ok)}</p>`:''}
    </div>`:``}

    <div style="height:90px"></div>
  </div>

  <!-- Botão fixo -->
  <div style="position:fixed;bottom:0;left:0;right:0;padding:16px;background:var(--bg);border-top:1px solid var(--border)">
    ${!S.licaoConf?`
    <button onclick="licaoConfirmar()" ${!S.licaoSel?'disabled':''} class="btn-primary" style="padding:17px;font-size:16px;opacity:${S.licaoSel?1:.4}">
      Confirmar
    </button>`:`
    <button onclick="licaoAvancar(${qIdx})" class="btn-primary" style="padding:17px;font-size:16px;background:${lic.cor}">
      ${qIdx<S.licaoQuestoes.length-1?'Próxima →':'Ver resultado →'}
    </button>`}
  </div>
</div>`;
}

function licaoSelAlt(l){S.licaoSel=l;renderLicao();}
function licaoConfirmar(){
  if(!S.licaoSel)return;
  S.licaoConf=true;
  const q=S.licaoQuestoes[S.licaoQIdx];
  const ok=S.licaoSel===q.ans;
  if(ok)showFeedback(true);
  else{showFeedback(false);S.licaoErros.push(q);}
  // Salva no progresso global também
  S.ans[q.id]=ok?q.ans:'__errado__';
  salvarResposta(q.id,ok);
  renderLicao();
}
function licaoAvancar(qIdx){
  S.licaoQIdx++;S.licaoSel=null;S.licaoConf=false;
  S.licaoEtapa++;renderLicao();
}

// ═══════════════════════════════════════════════════════════════════
// CONCLUSÃO DA LIÇÃO
// ═══════════════════════════════════════════════════════════════════
function renderLicaoConclusao(){
  const lic=LICOES[S.licaoAtual];
  const total=S.licaoQuestoes.length;
  const erros=S.licaoErros.length;
  const acertos=total-erros;
  const pct=total>0?Math.round(acertos/total*100):100;

  $('app').innerHTML=`
<div style="background:var(--bg);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:32px 24px;text-align:center">

  <div style="font-size:80px;margin-bottom:16px;animation:celebrate .8s ease both">${pct===100?'🏆':pct>=66?'🎉':'💪'}</div>

  <div style="font-family:var(--display);font-size:28px;font-weight:900;margin-bottom:8px">
    ${pct===100?'Perfeito!':pct>=66?'Muito bem!':'Continue praticando!'}
  </div>

  <div style="font-size:16px;color:var(--text2);margin-bottom:32px">${S.licaoAtual} concluído</div>

  <!-- Stats -->
  <div style="display:flex;gap:20px;margin-bottom:32px">
    <div style="text-align:center;padding:16px 24px;background:var(--green-bg);border:1.5px solid var(--green-border);border-radius:20px">
      <div style="font-family:var(--mono);font-size:32px;font-weight:900;color:var(--green)">${acertos}</div>
      <div style="font-size:12px;color:var(--green);font-weight:700;margin-top:4px">ACERTOS</div>
    </div>
    ${erros>0?`<div style="text-align:center;padding:16px 24px;background:var(--red-bg);border:1.5px solid var(--red-border);border-radius:20px">
      <div style="font-family:var(--mono);font-size:32px;font-weight:900;color:var(--red)">${erros}</div>
      <div style="font-size:12px;color:var(--red);font-weight:700;margin-top:4px">ERROS</div>
    </div>`:''}
    <div style="text-align:center;padding:16px 24px;background:rgba(255,215,64,.1);border:1.5px solid rgba(255,215,64,.25);border-radius:20px">
      <div style="font-family:var(--mono);font-size:32px;font-weight:900;color:var(--yellow)">${acertos*10}</div>
      <div style="font-size:12px;color:var(--yellow);font-weight:700;margin-top:4px">XP</div>
    </div>
  </div>

  <div style="width:100%;max-width:360px;display:flex;flex-direction:column;gap:10px">
    <button onclick="navTo('quiz-setup')" class="btn-primary" style="padding:16px;font-size:16px">
      Praticar mais ${lic.emoji} ${S.licaoAtual} →
    </button>
    <button onclick="go('aprender')" class="btn-secondary" style="padding:14px">
      ← Voltar às lições
    </button>
  </div>
</div>`;
}
</script>
